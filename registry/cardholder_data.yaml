theme_id: CARDHOLDER_DATA
theme_version: 2026.1.0
ratified_by: governance_forum
ratified_at: 2026-01-15
description: >
  Primary Account Numbers (PANs) and full track / CVV data fall under
  PCI-DSS Account Data scope. PAN must be rendered unreadable wherever
  it is stored, processed, or transmitted, and full track / CVV must
  never be persisted post-authorization.

regulations:
  - framework: pci_dss_v4_0
    requirements:
      - id: "3.4.1"
        text: "PAN is rendered unreadable anywhere it is stored."
      - id: "3.5.1"
        text: "Cryptographic keys used for encryption of cardholder data must be protected against disclosure and misuse."
      - id: "3.3.1"
        text: "Sensitive Authentication Data (full track, CVV) is not retained after authorization."
  - framework: soc_2
    criteria:
      - "CC6.1"
      - "CC6.7"

triggers:
  fields:
    - name: card_number
      aliases: [pan, primary_account_number]
    - name: cvv
      aliases: [cvc, card_verification_value, security_code]
  request_keys:
    - "card_number"
    - "pan"
    - "cvv"
  imports:
    - "stripe"
    - "braintree"

required_controls:
  - control_id: PAN_001
    description: "PAN must pass through tokenization before any persistence or logging."
    detection: "Function 'tokenize' must appear between PAN source and any sink."
  - control_id: PAN_002
    description: "Full CVV / track data must not be persisted or logged in any form."
    detection: "CVV-derived values must never reach storage or logging sinks."
  - control_id: PAN_003
    description: "Token vault keys must live in KMS — see CRYPTOGRAPHIC_KEYS theme."

required_evidence:
  - tokenization_call_present
  - audit_log_carries_token_only
  - kms_key_policy_attested

sanitizers:
  - "tokenization.tokenize"
  - "tokenization.mask_pan"

sinks:
  - "audit_logger.log_event"
  - "logging.*"
  - "print"
  - "email_sender.send_receipt"
