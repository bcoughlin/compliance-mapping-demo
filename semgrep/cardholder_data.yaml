# Taint rules derived from registry/cardholder_data.yaml
# theme_id: CARDHOLDER_DATA, theme_version: 2026.1.0

rules:
  - id: cardholder-data-pan-to-sink-without-tokenization
    mode: taint
    message: |
      PAN flows to a regulated sink without passing through tokenization.
      Theme CARDHOLDER_DATA@2026.1.0, control PAN_001 (PCI-DSS 3.4.1):
      "PAN is rendered unreadable anywhere it is stored."
    severity: ERROR
    languages: [python]
    metadata:
      theme_id: CARDHOLDER_DATA
      theme_version: 2026.1.0
      control_id: PAN_001
      framework: pci_dss_v4_0
      requirement: "3.4.1"

    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $REQ["body"]["card_number"]
              - pattern: $REQ["body"]["pan"]
              - pattern: $REQ["body"]["cvv"]
              - pattern: |
                  def $F(..., pan, ...):
                    ...
              - pattern: |
                  def $F(..., card_number, ...):
                    ...

    pattern-sanitizers:
      - pattern: tokenization.tokenize(...)
      - pattern: tokenize(...)

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: audit_logger.log_event(...)
              - pattern: logger.info(...)
              - pattern: logger.debug(...)
              - pattern: logger.warning(...)
              - pattern: logger.error(...)
              - pattern: print(...)
              - pattern: email_sender.send_receipt(...)
              - pattern: payment_store.save_payment(...)
              - pattern: payment_store.save_refund(...)

  - id: cardholder-data-pan-as-dict-value-in-log
    message: |
      Raw PAN is being passed as a value inside a dict that reaches the
      audit log. Theme CARDHOLDER_DATA@2026.1.0, control PAN_001:
      tokenize() must be called before any persistence or logging sink.
    severity: ERROR
    languages: [python]
    metadata:
      theme_id: CARDHOLDER_DATA
      theme_version: 2026.1.0
      control_id: PAN_001
      framework: pci_dss_v4_0
      requirement: "3.4.1"
    patterns:
      - pattern-either:
          - pattern: |
              audit_logger.log_event(..., {..., "pan": $X, ...})
          - pattern: |
              audit_logger.log_event(..., {..., "card_number": $X, ...})
          - pattern: |
              audit_logger.log_event(..., {..., "cvv": $X, ...})
